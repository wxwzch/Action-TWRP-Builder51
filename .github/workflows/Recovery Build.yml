name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-5.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

# 添加并发控制，避免多个构建同时运行
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.DEVICE_NAME }}
  cancel-in-progress: false

jobs:
  build:
    # 临时移除条件限制，确保能运行
    # if: github.event.repository.owner.id == github.event.sender.id
    timeout-minutes: 360  # 6小时超时
    runs-on: ubuntu-latest  # 使用 latest 获得更多资源
    permissions:
      contents: write
    
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"
        echo "Runner OS: $(uname -a)"
        echo "Current time: $(date)"

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup disk space
      run: |
        # 清理磁盘空间，确保有足够空间编译
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo docker system prune -af
        df -h

    - name: Install Python 2 and JDK 8
      run: |
        sudo apt-get update
        sudo apt-get install -y python2 python2-dev openjdk-8-jdk
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        # 设置 Java 环境
        echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
        echo "$JAVA_HOME/bin" >> $GITHUB_PATH
        java -version

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python-is-python3 \
            ccache liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev bc lzop lzma liblzma-dev \
            kmod cpio repo
        
        # 安装额外的工具
        sudo apt-get install -y \
            imagemagick schedtool squashfs-tools \
            pngcrush libbz2-dev ncftp qemu-user-static \
            libreadline-dev libreadline6-dev
        
        # 安装 repo 工具
        mkdir -p ~/.local/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
        chmod a+x ~/.local/bin/repo
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Initialize repo
      run: |
        mkdir -p workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: init

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j4 --force-sync --no-tags --no-clone-bundle
      shell: bash

    - name: Clone device tree
      run: |
        cd ${{ steps.init.outputs.workspace-folder }}
        git clone --depth=1 -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ${{ github.event.inputs.DEVICE_TREE_URL }} ./${{ github.event.inputs.DEVICE_PATH }}
        if [ $? -ne 0 ]; then
          echo "Failed to clone device tree"
          exit 1
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building recovery
      run: |
        cd ${{ steps.init.outputs.workspace-folder }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        mka ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      shell: bash

    - name: Check build output
      run: |
        IMAGE_PATH="${{ steps.init.outputs.workspace-folder }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img"
        if [ -f "$IMAGE_PATH" ]; then
          echo "Build successful! Image size: $(ls -lh $IMAGE_PATH | awk '{print $5}')"
        else
          echo "Build failed - image not found at $IMAGE_PATH"
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          ${{ steps.init.outputs.workspace-folder }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          ## Build Information
          - **Device**: ${{ github.event.inputs.DEVICE_NAME }}
          - **Target**: ${{ github.event.inputs.BUILD_TARGET }}.img
          - **Manifest**: ${{ github.event.inputs.MANIFEST_BRANCH }}
          - **Device Tree**: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}
          - **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Runner**: Ubuntu Latest
          - **Build ID**: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
